<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Good Morning 😊</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
        }

        h1 {
            margin-top: 50px;
            font-size: 50px;
            text-shadow: 2px 2px 10px black;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            margin: 40px auto;
            width: 300px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        img {
            width: 100%;
            border-radius: 20px;
        }

        p {
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>Good Morning My Cuttiiiiii 😊</h1>

    <div class="card">
        <img src="your-name.jpg" alt="Her Image">
        <p>You make my mornings beautiful 🌸</p>
    </div>

</body>
</html>
